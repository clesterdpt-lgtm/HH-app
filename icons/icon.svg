<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f2744"/>
  <g transform="translate(256,256)">
    <!-- Stethoscope head -->
    <circle cx="0" cy="80" r="48" fill="none" stroke="#14b8a6" stroke-width="24"/>
    <circle cx="0" cy="80" r="16" fill="#14b8a6"/>
    <!-- Tubing -->
    <path d="M-48 80 C-48 -20 -80 -60 -80 -120" fill="none" stroke="#14b8a6" stroke-width="20" stroke-linecap="round"/>
    <path d="M48 80 C48 -20 80 -60 80 -120" fill="none" stroke="#14b8a6" stroke-width="20" stroke-linecap="round"/>
    <!-- Earpieces -->
    <circle cx="-80" cy="-120" r="18" fill="#14b8a6"/>
    <circle cx="80" cy="-120" r="18" fill="#14b8a6"/>
    <!-- Crossbar -->
    <line x1="-80" y1="-120" x2="80" y2="-120" stroke="#14b8a6" stroke-width="16" stroke-linecap="round"/>
  </g>
</svg>
