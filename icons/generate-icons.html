<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<h2>CareNote Icon Generator</h2>
<p>Right-click each icon and "Save image as..." to save the PNG files to the icons folder.</p>
<div id="output"></div>
<script>
const sizes = [
    { name: 'icon-192.png', size: 192 },
    { name: 'icon-512.png', size: 512 },
    { name: 'apple-touch-icon.png', size: 180 }
];

const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f2744"/>
  <g transform="translate(256,256)">
    <circle cx="0" cy="80" r="48" fill="none" stroke="#14b8a6" stroke-width="24"/>
    <circle cx="0" cy="80" r="16" fill="#14b8a6"/>
    <path d="M-48 80 C-48 -20 -80 -60 -80 -120" fill="none" stroke="#14b8a6" stroke-width="20" stroke-linecap="round"/>
    <path d="M48 80 C48 -20 80 -60 80 -120" fill="none" stroke="#14b8a6" stroke-width="20" stroke-linecap="round"/>
    <circle cx="-80" cy="-120" r="18" fill="#14b8a6"/>
    <circle cx="80" cy="-120" r="18" fill="#14b8a6"/>
    <line x1="-80" y1="-120" x2="80" y2="-120" stroke="#14b8a6" stroke-width="16" stroke-linecap="round"/>
  </g>
</svg>`;

sizes.forEach(({ name, size }) => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const img = new Image();
    const blob = new Blob([svgContent], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
        const div = document.createElement('div');
        div.style.marginBottom = '20px';
        div.innerHTML = `<h3>${name} (${size}x${size})</h3>`;
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = name;
        link.textContent = `Download ${name}`;
        link.style.cssText = 'display:inline-block;padding:8px 16px;background:#0d9488;color:#fff;border-radius:8px;text-decoration:none;margin-right:12px;';
        div.appendChild(link);
        div.appendChild(canvas);
        canvas.style.cssText = 'display:block;margin-top:8px;border:1px solid #ccc;';
        document.getElementById('output').appendChild(div);
    };
    img.src = url;
});
</script>
</body>
</html>
